name: cron-snapshots
on:
  schedule:
    - cron: '5 0 * * *'   # UTC, just past midnight after the day closes
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: cron-snapshots
  cancel-in-progress: false
jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/snapshots
        env:
          URL: ${{ secrets.PRODUCTION_URL }}
          TOKEN: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/api/cron/snapshots"
