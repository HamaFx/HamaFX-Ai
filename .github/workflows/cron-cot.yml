name: cron-cot
on:
  schedule:
    - cron: '0 22 * * 5'   # UTC, Friday 22:00 — just after the CFTC weekly window
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: cron-cot
  cancel-in-progress: false
jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/cot
        env:
          URL: ${{ secrets.PRODUCTION_URL }}
          TOKEN: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/api/cron/cot"
