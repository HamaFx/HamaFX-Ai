name: cron-weekly-review
on:
  schedule:
    - cron: '0 18 * * 0'   # Sunday 18:00 UTC
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: cron-weekly-review
  cancel-in-progress: false
jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/weekly-review
        env:
          URL: ${{ secrets.PRODUCTION_URL }}
          TOKEN: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/api/cron/weekly-review"
