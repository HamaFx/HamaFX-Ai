name: cron-calendar
on:
  schedule:
    - cron: '*/15 * * * *'   # UTC, GitHub Actions 5-minute minimum granularity
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: cron-calendar
  cancel-in-progress: false
jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/calendar
        env:
          URL: ${{ secrets.PRODUCTION_URL }}
          TOKEN: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/api/cron/calendar"
