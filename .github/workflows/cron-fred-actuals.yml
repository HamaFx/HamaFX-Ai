name: cron-fred-actuals
on:
  schedule:
    - cron: '30 1 * * *'   # UTC — just after the US east-coast publishing window
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: cron-fred-actuals
  cancel-in-progress: false
jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/fred-actuals
        env:
          URL: ${{ secrets.PRODUCTION_URL }}
          TOKEN: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/api/cron/fred-actuals"
