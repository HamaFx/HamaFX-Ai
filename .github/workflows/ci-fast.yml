name: ci-fast

on:
  pull_request:

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # `package.json` pins the exact pnpm version via `packageManager`; let
      # pnpm/action-setup auto-detect it rather than re-specifying here. The
      # previous `with: version: 9` double-specified pnpm and caused
      # Corepack to abort with "Multiple versions of pnpm specified" in ~3s
      # (08 §1c).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint
      - run: pnpm turbo run typecheck
      # L-2: Audit dependencies for known vulnerabilities at PR time.
      # Blocks the build on CRITICAL severity advisories.
      # Once existing advisories are addressed, raise to --audit-level=high.
      - run: pnpm audit --audit-level=critical
      # Phase 0.5: real build gate so a broken `next build` is caught in PR CI,
      # not only later by Vercel.
      - run: pnpm turbo run build
      # Phase 0.6: enforce JS chunk size budgets so severe bundle bloat is caught
      # before it reaches Vercel.
      - name: Bundle Size Guard
        run: pnpm --filter @hamafx/web bundle-size:check
      # L1: Bundle analysis — run with ANALYZE=true to surface size regressions.
      # The @next/bundle-analyzer generates a report but doesn't fail the build.
      - name: Bundle Analysis
        if: github.event_name == 'pull_request'
        run: ANALYZE=true pnpm --filter @hamafx/web build
        continue-on-error: true

  unit-tests:
    name: Unit Tests (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Phase 0.8: coverage on the PR path so coverage regressions are caught
      # at PR time, not only nightly.
      - run: pnpm turbo run test -- --coverage
      - name: Test File Guard
        run: pnpm test:empty-guard
      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          vite-config-path: vitest.workspace.ts

  e2e-tests:
    name: E2E Playwright (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps
        working-directory: ./apps/web
      - run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        working-directory: ./apps/web
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: apps/web/playwright-report/
          retention-days: 30
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-shard-${{ matrix.shardIndex }}
          path: apps/web/test-results/junit.xml
          retention-days: 30
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-shard-${{ matrix.shardIndex }}
          path: |
            apps/web/test-results/output/
            apps/web/test-results/.last-run.json
          retention-days: 7
