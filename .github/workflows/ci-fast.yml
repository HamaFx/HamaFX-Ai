name: ci-fast

on:
  pull_request:

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # `package.json` pins the exact pnpm version via `packageManager`; let
      # pnpm/action-setup auto-detect it rather than re-specifying here. The
      # previous `with: version: 9` double-specified pnpm and caused
      # Corepack to abort with "Multiple versions of pnpm specified" in ~3s
      # (08 §1c).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint
      - run: pnpm turbo run typecheck
      # Phase 0.5: real build gate so a broken `next build` is caught in PR CI,
      # not only later by Vercel.
      - run: pnpm turbo run build

  unit-tests:
    name: Unit Tests (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Phase 0.8: coverage on the PR path so coverage regressions are caught
      # at PR time, not only nightly.
      - run: pnpm turbo run test -- --coverage
      - name: Test File Guard
        run: pnpm test:empty-guard
      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          vite-config-path: vitest.workspace.ts
