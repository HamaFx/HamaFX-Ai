# HamaFX-Ai — one-command Docker deployment
#
# Usage:
#   cp .env.example .env   # fill in your API keys
#   docker compose up -d
#   # Open http://localhost:3000
#
# The Postgres container includes pgvector for full feature support.
# All data persists in Docker volumes across restarts.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hamafx
      POSTGRES_USER: hamafx
      POSTGRES_PASSWORD: hamafx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-langfuse-db.sh:/docker-entrypoint-initdb.d/init-langfuse-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hamafx -d hamafx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:3
    container_name: hamafx-langfuse
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Postgres — reuses the same database server, separate database
      DATABASE_URL: postgresql://hamafx:hamafx@db:5432/langfuse
      # Auth secrets — generate fresh for each deployment
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-langfuse-nextauth-at-least-32-chars}
      SALT: ${LANGFUSE_SALT:-change-me-langfuse-salt-at-least-16-chars}
      # Telemetry (opt-out of Langfuse's own anonymous usage stats)
      TELEMETRY_ENABLED: "false"
      # Enable experimental features: LLM-as-Judge evals, datasets
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://hamafx:hamafx@db:5432/hamafx
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://hamafx:hamafx@db:5432/hamafx
      NODE_ENV: production
      WORKER_MODE: docker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: