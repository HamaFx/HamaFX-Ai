# HamaFX-Ai — one-command Docker deployment
#
# Usage:
#   cp .env.example .env   # fill in your API keys
#   docker compose up -d
#   # Open http://localhost:3000
#
# The Postgres container includes pgvector for full feature support.
# All data persists in Docker volumes across restarts.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hamafx
      POSTGRES_USER: hamafx
      POSTGRES_PASSWORD: hamafx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-langfuse-db.sh:/docker-entrypoint-initdb.d/init-langfuse-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hamafx -d hamafx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:3
    container_name: hamafx-langfuse
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Postgres — reuses the same database server, separate database
      DATABASE_URL: postgresql://hamafx:hamafx@db:5432/langfuse
      # Auth secrets — generate fresh for each deployment
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-langfuse-nextauth-at-least-32-chars}
      SALT: ${LANGFUSE_SALT:-change-me-langfuse-salt-at-least-16-chars}
      # Telemetry (opt-out of Langfuse's own anonymous usage stats)
      TELEMETRY_ENABLED: "false"
      # Enable experimental features: LLM-as-Judge evals, datasets
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://hamafx:hamafx@db:5432/hamafx
      NODE_ENV: production
      # PERF-06: Tune the postgres-js connection pool. 5 connections per web
      # instance covers concurrent tool calls + budget + telemetry without
      # exhausting Supabase's transaction pooler ceiling.
      DB_POOL_MAX: "5"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # INFRA-01: Health check so Docker/Compose knows when the app is ready.
    # Polls /api/health which verifies DB connectivity. 3 retries × 10s =
    # 30s grace period for Next.js cold start.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # INFRA-02: Reasonable resource limits. Adjust for your hardware.
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://hamafx:hamafx@db:5432/hamafx
      NODE_ENV: production
      WORKER_MODE: docker
      # PERF-06: Worker pool — 3 is sufficient for tick-flush + cron inserts.
      HAMAFX_RUNTIME: worker
      WORKER_DB_POOL_MAX: "3"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # INFRA-01: Worker exposes a lightweight HTTP health server on port 8081.
    # See apps/worker/src/index.ts — it responds { status: 'ok' } at /.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # INFRA-02: Worker is lighter; 512MB cap covers SignalR + candle aggregation.
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    restart: unless-stopped

volumes:
  pgdata: