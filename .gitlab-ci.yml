include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml

image: node:20

stages:
  - test
  - build
  - publish
  - e2e
  - eval

variables:
  PNPM_CACHE_FOLDER: .pnpm-store

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store
    - node_modules/
    - "*/node_modules/"
    - "apps/*/node_modules/"
    - "packages/*/node_modules/"

before_script:
  - npm install -g pnpm@9
  - pnpm config set store-dir .pnpm-store
  - pnpm install --frozen-lockfile

# ==========================================
# LINT & TYPECHECK
# ==========================================
lint-and-typecheck:
  stage: test
  script:
    - pnpm turbo run lint
    - pnpm turbo run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ==========================================
# UNIT TESTS
# ==========================================
unit-tests-fast:
  stage: test
  script:
    - pnpm turbo run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

unit-tests-coverage:
  stage: test
  script:
    - pnpm turbo run test -- --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    paths:
      - coverage/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ==========================================
# E2E TESTS (Playwright) & ENVIRONMENT
# ==========================================
e2e-tests:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.44.0-jammy
  environment:
    name: staging
  script:
    - pnpm exec playwright install --with-deps
    - cd apps/web && pnpm exec playwright test
  artifacts:
    when: always
    paths:
      - apps/web/playwright-report/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ==========================================
# NIGHTLY EVAL
# ==========================================
nightly-eval:
  stage: eval
  script:
    - pnpm turbo run eval
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ==========================================
# CONTAINER REGISTRY (Docker Publish)
# ==========================================
docker-publish:
  stage: publish
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/web:$CI_COMMIT_REF_SLUG -f Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/web:$CI_COMMIT_REF_SLUG
    - docker build -t $CI_REGISTRY_IMAGE/worker:$CI_COMMIT_REF_SLUG -f Dockerfile.worker .
    - docker push $CI_REGISTRY_IMAGE/worker:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
